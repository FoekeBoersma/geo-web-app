<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Geo Web App</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="controls">
    <label for="place">Place:</label>
    <input id="place" type="search" placeholder="e.g. Paris" value="Paris" />
    <button id="search">Search</button>
    <span id="status" ></span>
  </div>

  <div id="route-controls">
    <label for="origin">Route:</label>
    <input id="origin" type="search" placeholder="Origin e.g. Amsterdam "/>
    <span>→</span>
    <input id="destination" type="search" placeholder="Destination e.g. Rotterdam"/>
    <button id="route-btn">Get Route</button>
  </div>

  <div id="route-download">
    <label for="origin">Download Route</label>
    <button id="download-btn">Download</button>
  </div>

  <div id="map"></div>

  <!-- Leaflet JS (before script but after DOM) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
